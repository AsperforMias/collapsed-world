<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 528 528">
    <defs>
        <!-- 遮罩1：让【沙漏斜线 (左上至右下)】被中心断开避让 -->
        <mask id="mask-h-sub">
            <rect width="100%" height="100%" fill="white" />
            <!-- ① 主杆切割：统一回归 48 宽度，确保全图的截面间隙完全对齐 -->
            <path d="M 384 64 L 144 464" fill="none" stroke="black" stroke-width="48" stroke-linecap="round" />
            <!-- ② 新增：叠加使用前带切痕，消除重叠溢出角。同步微调切割遮罩。 -->
            <path d="M 44 264 C 44 198, 144 218, 264 264 C 384 310, 484 330, 484 264" fill="none" stroke="black" stroke-width="32" stroke-linecap="round" />
        </mask>

        <!-- 遮罩2：让底层的莫比乌斯后带在穿过中心时被挡住沉入地下 -->
        <mask id="mask-m-back">
            <rect width="100%" height="100%" fill="white" />
            <path d="M 144 64 L 384 464 M 384 64 L 144 464" fill="none" stroke="black" stroke-width="48" stroke-linecap="round" />
        </mask>
        
        <!-- 遮罩3：让【莫比乌斯环前带】被沙漏主杆切割 -->
        <mask id="mask-m-front">
            <rect width="100%" height="100%" fill="white" />
            <!-- 用最高层主杆刻痕切割前带，同步回归 48，以保持前后带的切面绝对平行且不遮挡 -->
            <path d="M 384 64 L 144 464" fill="none" stroke="black" stroke-width="48" stroke-linecap="round" />
        </mask>
    </defs>

    <!-- 1. [最底层] 莫比乌斯环 后带，断开掩埋。 (在保持圆润的前提下再压扁一点) -->
    <path fill="none" stroke="#1a1a1a" stroke-width="16" stroke-linecap="round" 
          mask="url(#mask-m-back)"
          d="M 44 264 C 44 330, 144 310, 264 264 C 384 218, 484 198, 484 264" />

    <!-- 2. [此层] 沙漏 左上↔右下 斜线，中心断开（同时避让了主杆和莫比乌斯环的重叠角）。 -->
    <path fill="none" stroke="#1a1a1a" stroke-width="32" stroke-linecap="round"
          mask="url(#mask-h-sub)"
          d="M 144 64 L 384 464" />

    <!-- 3. 时间：沙漏横向封顶底座 -->
    <path d="M 144 64 L 384 64 M 144 464 L 384 464" fill="none" stroke="#1a1a1a" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />

    <!-- 4. [高层] 莫比乌斯环 前带，被位于顶层的主杆斩断。 (在保持圆润的前提下再压扁一点) -->
    <path fill="none" stroke="#1a1a1a" stroke-width="16" stroke-linecap="round" 
          mask="url(#mask-m-front)"
          d="M 44 264 C 44 198, 144 218, 264 264 C 384 310, 484 330, 484 264" />

    <!-- 5. [最顶层] 沙漏 右上↔左下 主杆，完好无损，处于绝对顶部。 -->
    <path d="M 384 64 L 144 464" fill="none" stroke="#1a1a1a" stroke-width="32" stroke-linecap="round" />
</svg>